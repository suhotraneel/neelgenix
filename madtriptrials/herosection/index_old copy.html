<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horizontal Scroll with Image</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      /* overflow: hidden; no default scrollbars */
    }

    .scroll-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      white-space: nowrap;
    }

    .scroll-container video {
      position: absolute;
      top: 0;
      height: 100vh;
      width: auto;
      display: block;
    }

    #video1 {
      z-index: 1;
      /* Sky layer */
      opacity: 0.7;
    }

    #video2 {
      z-index: 2;
      /* Background layer */
    }

    .frame-container {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 80vh;
      width: auto;
      z-index: 3;
    }

    .frame-container img {
      width: auto;
      height: 100%;
      display: block;
    }

    @media (max-width: 1024px) {
      .frame-container {
        top: 65%;
        height: 70vh;
      }
    }

    @media (max-width: 480px) {
      .frame-container {
        top: 70%;
        height: 60vh;
      }
    }
  </style>
</head>

<body style="background-color: #000000;">

  <div class="scroll-container" id="scrollContainer">
    <video autoplay muted loop playsinline id="video1">
      <!-- <source src="https://raw.githubusercontent.com/suhotraneel/madtripstore/main/hero_layers/sky.webm" type="video/webm"> -->
      <source src="hero_layers/sky.webm" type="video/webm">
      Your browser does not support the video tag.
    </video>
    <video autoplay muted loop playsinline id="video2">
      <!-- <source src="https://raw.githubusercontent.com/suhotraneel/madtripstore/main/hero_layers/background.webm" type="video/webm"> -->
      <source src="hero_layers/background.webm" type="video/webm">
      Your browser does not support the video tag.
    </video>
    <div class="frame-container">
      <img id="animFrame" src="walk_frames/framea.png" alt="Animation Frame">
    </div>
  </div>

  <div>
    <img src="lower.png" width="100%" height="auto" alt="">
  </div>

  <script>
    const scrollContainer = document.getElementById('scrollContainer');
    const video1 = document.getElementById('video1');
    const video2 = document.getElementById('video2');
    const imgEl = document.getElementById("animFrame");
    const frameContainer = document.querySelector('.frame-container');

    const starterFrame = "walk_frames/framea.png";
    const loopFrames = [
      "walk_frames/frame1.png",
      "walk_frames/frame2.png",
      "walk_frames/frame3.png",
      "walk_frames/frame4.png",
      "walk_frames/frame5.png",
      "walk_frames/frame6.png",
      "walk_frames/frame7.png",
      "walk_frames/frame8.png"
    ];

    let scrollSpeed1, scrollSpeed2;
    let maxScrollableDistance = 0;
    let scrollX = 0;

    function getDynamicWidth(video) {
      const viewportHeight = window.innerHeight;
      const aspectRatio = video.videoWidth / video.videoHeight;
      return viewportHeight * aspectRatio;
    }

    function setupRatios() {
      const viewportWidth = window.innerWidth;
      const width1 = getDynamicWidth(video1);
      const width2 = getDynamicWidth(video2);

      const scroll1 = width1 - viewportWidth;
      const scroll2 = width2 - viewportWidth;

      maxScrollableDistance = Math.max(scroll1, scroll2);
      scrollSpeed1 = (scroll1 / maxScrollableDistance);
      scrollSpeed2 = (scroll2 / maxScrollableDistance);

      // Debug: Log image widths and scroll distances
      console.log("Viewport Width:", viewportWidth);
      console.log("Video 1 (width):", width1, "Scroll distance:", scroll1);
      console.log("Video 2 (width):", width2, "Scroll distance:", scroll2);
      console.log("Max Scrollable Distance:", maxScrollableDistance);
      console.log("Scroll Speed 1:", scrollSpeed1);
      console.log("Scroll Speed 2:", scrollSpeed2);
    }

    function updateFramesFromScroll() {
      const animationProgress = maxScrollableDistance === 0 ? 0 : (scrollX / maxScrollableDistance);

      if (animationProgress <= 0.01) {
        imgEl.src = starterFrame;
      } else {
        const loopProgress = Math.max(0, (animationProgress - 0.01) * 120);
        const idxRaw = Math.floor(loopProgress);
        const frameIndex = ((idxRaw % loopFrames.length) + loopFrames.length) % loopFrames.length;
        imgEl.src = loopFrames[frameIndex];
      }

      if (scrollX <= maxScrollableDistance) {
        // Keep character centered until scroll completes
        frameContainer.style.transform = "translate(-50%, -50%)";
      } else {
        // After progress 1.0 → start moving container right
        const fw = frameContainer.offsetWidth || 300;
        const vw = window.innerWidth;
        const distanceToRight = (vw / 2) + (fw / 2) + 40; // px to move from center to off-screen (+40 buffer)

        const overscroll = scrollX - maxScrollableDistance;
        const overscrollRange = 400; // px of scroll to complete walk-out
        const overscrollProgress = Math.min(1, Math.max(0, overscroll / overscrollRange));

        const dx = overscrollProgress * distanceToRight;
        frameContainer.style.transform = `translateX(calc(-50% + ${dx}px)) translateY(-50%)`;
      }
    }

    function applyScroll() {
      const overscrollRange = 400;
      scrollX = Math.max(0, Math.min(scrollX, maxScrollableDistance + overscrollRange));

      const videoScrollX = Math.min(scrollX, maxScrollableDistance);
      video1.style.left = `${-videoScrollX * scrollSpeed1}px`;
      video2.style.left = `${-videoScrollX * scrollSpeed2}px`;

      updateFramesFromScroll();
    }

    // Add this function to your existing script
    function preloadImages(urls) {
      const promises = urls.map(url => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.src = url;
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error(`Failed to load image at ${url}`));
        });
      });
      return Promise.all(promises);
    }

    function waitForVideos(callback) {
      let loaded = 0;
      const total = 2;
      function check() {
        loaded++;
        if (loaded === total) {
          // Now that videos are ready, start preloading images
          preloadImages(loopFrames).then(() => {
            console.log("All animation frames preloaded successfully.");
            callback();
          }).catch(error => {
            console.error("Error preloading images:", error);
            // Still call the callback to let the rest of the script run, even if preloading fails
            callback();
          });
        }
      }
      if (video1.readyState >= 1) check(); else video1.addEventListener('loadedmetadata', check);
      if (video2.readyState >= 1) check(); else video2.addEventListener('loadedmetadata', check);
    }

    waitForVideos(() => {
      setupRatios();
      applyScroll();
    });

    scrollContainer.addEventListener('wheel', (e) => {
      if (window.scrollY > 0) {
        return; // Let natural scroll handle it when we've scrolled down
      }

      const overscrollRange = 400;
      const totalScrollable = maxScrollableDistance + overscrollRange;

      if (scrollX >= totalScrollable && e.deltaY > 0) {
        return; // Allows native scroll down to lower sections
      }

      if (scrollX <= 0 && e.deltaY < 0) {
        return; // Allows native scroll up
      }

      e.preventDefault();
      scrollX += e.deltaY;
      applyScroll();
    });

    window.addEventListener('resize', () => {
      setupRatios();
      applyScroll();
    });
  </script>
</body>

</html>
