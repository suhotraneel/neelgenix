<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Frame Animation</title>
  <style>
    body {
      margin: 0;
      height: 500vh;
      /* Makes enough space to scroll */
      background: #000000;
    }

    .frame-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
      max-height: 600px;
    }

    .frame-container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>

  <div class="frame-container">
    <img id="animFrame" src="walk_frames/framea.png" alt="Animation Frame">
  </div>

  <script>
    // Starter frame (not part of the loop)
    const starterFrame = "framea.png";

    // 8 looping frames
    const loopFrames = [
      "frame1.png", "frame2.png", "frame3.png", "frame4.png",
      "frame5.png", "frame6.png", "frame7.png", "frame8.png"
    ];

    const imgEl = document.getElementById("animFrame");

    window.addEventListener("scroll", () => {
      // How far we scrolled (0 to 1)
      const scrollProgress = window.scrollY / (document.body.scrollHeight - window.innerHeight);

      // Decide which frame to show
      if (scrollProgress <= 0.01) {
        // First tiny bit of scroll: show starter
        imgEl.src = `walk_frames/${starterFrame}`;
      } else {
        // After starter: loop frames
        const loopProgress = (scrollProgress - 0.01) * 80; // speed factor
        const frameIndex = Math.floor(loopProgress) % loopFrames.length;
        imgEl.src = `walk_frames/${loopFrames[frameIndex]}`;
      }
    });
  </script>

</body>

</html>
