<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>Neel Genix - Page Not Found</title>

  <style>
    :root {
      --bg-color: #FFFCF5;
      --text-main: #111111;
      --accent-from: #7A0000;
      --accent-to: #B80000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Gotham', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      padding: 2rem;
      max-width: 600px;
      animation: fadeIn 0.8s ease-out;
    }

    .error-code {
      font-size: clamp(8rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--accent-to), var(--accent-from));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -5px;
    }

    .message {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 2rem;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(to right, var(--accent-to), var(--accent-from));
      color: #FFFCF5;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      border-radius: 4px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(86, 28, 17, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(86, 28, 17, 0.3);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="message">The page you're looking for has drifted into deep space.</div>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>

</html>
