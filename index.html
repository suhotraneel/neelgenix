<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suhotra Chakraborty | Neel Genix</title>

  <!-- Favicons for light and dark modes -->
  <link rel="icon" href="/assets/ngicondark.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/ngicondark.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/assets/ngiconlight.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">

  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
